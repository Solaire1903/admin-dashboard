<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="sidebar">
    <div class="sidebar-title">
      <img src="svg/circle-white.svg">
      <h1>Dashboard</h1>
    </div>
    <div class="navigation">
      <img src="svg/circle-white.svg">
      <p>Home</p>

      <img src="svg/circle-white.svg">
      <p>Profile</p>

      <img src="svg/circle-white.svg">
      <p>Messages</p>

      <img src="svg/circle-white.svg">
      <p>History</p>

      <img src="svg/circle-white.svg">
      <p>Tasks</p>

      <img src="svg/circle-white.svg">
      <p>Communities</p>
    </div>
    <div class="branding">
      <img src="svg/circle-white.svg">
      <p>Settings</p>

      <img src="svg/circle-white.svg">
      <p>Support</p>

      <img src="svg/circle-white.svg">
      <p>Privacy</p>
    </div>
  </div>

  <div class="header">
    <div class="search-bar-area">
      <img src="svg/circle-black.svg">
      <input type="search" name="search-bar">

    </div>
    <div class="user-info">
      <img src="svg/circle-black.svg">
      <img src="svg/circle-black.svg" class="user-icon">
      <p>Morgan Oakley</p>

    </div>
    <div class="greeting">
      <img src="svg/circle-black.svg">
      <p class="greeting-text">Hi there,</p>
      <p class="admin-name">Morgan Oakley (@morgan)</p>
    </div>
    <div class="header-buttons">
      <button type="button">New</button>
      <button type="button">Upload</button>
      <button type="button">Share</button>
    </div>
  </div>

  <div class="main-content">
    <div class="projects">
      <p>Your Projects</p>
      <div class="project-card-area">
        <div class="project-card"></div>
        <div class="project-card"></div>
        <div class="project-card"></div>
        <div class="project-card"></div>
        <div class="project-card"></div>
        <div class="project-card"></div>
      </div>

    </div>
    <div class="announcements">

    </div>
    <div class="trending">
      
    </div>
  </div>

</body>

</html>
